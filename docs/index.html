<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskSam Test Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .last-updated {
      color: #888;
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .stat-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
    }

    .stat-value.passed { color: #10b981; }
    .stat-value.failed { color: #ef4444; }
    .stat-value.total { color: #667eea; }
    .stat-value.rate { color: #f59e0b; }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }

    .test-table {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      margin-bottom: 30px;
    }

    .test-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .test-table th {
      background: rgba(255,255,255,0.05);
      padding: 16px 20px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
    }

    .test-table td {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .test-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .module-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .module-badge.ccop {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
    }

    .module-badge.expert {
      background: rgba(236, 72, 153, 0.2);
      color: #f472b6;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-badge.passed {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .status-badge.failed {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .status-badge.flaky {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    .status-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-icon.passed { background: #10b981; }
    .status-icon.failed { background: #ef4444; }
    .status-icon.flaky { background: #f59e0b; }

    .duration {
      color: #888;
      font-size: 13px;
    }

    .attachment-link {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .attachment-link:hover {
      color: #818cf8;
    }

    .run-history {
      display: flex;
      gap: 4px;
      margin-top: 20px;
    }

    .run-bar {
      flex: 1;
      height: 40px;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }

    .run-bar:hover {
      transform: scaleY(1.1);
    }

    .run-bar.passed { background: linear-gradient(180deg, #10b981 0%, #059669 100%); }
    .run-bar.failed { background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%); }
    .run-bar.partial { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); }

    .run-bar .tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 10;
    }

    .run-bar:hover .tooltip {
      opacity: 1;
      visibility: visible;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 13px;
      margin-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .test-table {
        overflow-x: auto;
      }
      
      .test-table table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">AS</div>
        <div>
          <h1>AskSam Test Dashboard</h1>
          <p class="last-updated">Last updated: <span id="lastUpdated"></span></p>
        </div>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Tests</div>
        <div class="stat-value total" id="totalTests">12</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Passed</div>
        <div class="stat-value passed" id="passedTests">12</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Failed</div>
        <div class="stat-value failed" id="failedTests">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pass Rate</div>
        <div class="stat-value rate" id="passRate">100%</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 100%"></div>
        </div>
      </div>
    </div>

    <div class="section-title">Run History (Last 10 Runs)</div>
    <div class="run-history" id="runHistory"></div>

    <div style="margin-top: 30px">
      <div class="section-title">Test Results</div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All Tests</button>
        <button class="filter-btn" data-filter="passed">Passed</button>
        <button class="filter-btn" data-filter="failed">Failed</button>
        <button class="filter-btn" data-filter="ccop">CCOP</button>
        <button class="filter-btn" data-filter="expert">Expert Dashboard</button>
      </div>
    </div>

    <div class="test-table">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Module</th>
            <th>Test Name</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Attachments</th>
          </tr>
        </thead>
        <tbody id="testResults"></tbody>
      </table>
    </div>

    <footer>
      AskSam Automation Suite &copy; 2026 | Powered by Playwright
    </footer>
  </div>

  <script>
    // Test data - This can be updated by CI/CD pipeline or manually
    const testData = {
      lastUpdated: new Date().toISOString(),
      runs: [
        { date: '2026-02-12', passed: 12, failed: 0, total: 12 },
        { date: '2026-02-11', passed: 11, failed: 1, total: 12 },
        { date: '2026-02-10', passed: 12, failed: 0, total: 12 },
        { date: '2026-02-09', passed: 10, failed: 2, total: 12 },
        { date: '2026-02-08', passed: 12, failed: 0, total: 12 },
        { date: '2026-02-07', passed: 11, failed: 1, total: 12 },
        { date: '2026-02-06', passed: 12, failed: 0, total: 12 },
        { date: '2026-02-05', passed: 9, failed: 3, total: 12 },
        { date: '2026-02-04', passed: 12, failed: 0, total: 12 },
        { date: '2026-02-03', passed: 12, failed: 0, total: 12 }
      ],
      tests: [
        {
          id: 1,
          module: 'CCOP',
          name: 'Clinician signup full flow (recorded)',
          status: 'passed',
          duration: '2m 15s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 2,
          module: 'CCOP',
          name: 'Help Center | Raise, Reply & Resolve Ticket',
          status: 'passed',
          duration: '59.7s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 3,
          module: 'CCOP',
          name: 'Create clinical note with document upload & transcription',
          status: 'passed',
          duration: '1m 48s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 4,
          module: 'CCOP',
          name: 'Create patient + upload + submit',
          status: 'passed',
          duration: '2m 0s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 5,
          module: 'Expert-Dashboard',
          name: 'Navigation flow validation',
          status: 'passed',
          duration: '1m 36s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 6,
          module: 'Expert-Dashboard',
          name: 'Help Center raise & reply ticket',
          status: 'passed',
          duration: '48.6s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 7,
          module: 'Expert-Dashboard',
          name: 'Create unique patient, search and view profile',
          status: 'passed',
          duration: '1m 36s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 8,
          module: 'Expert-Dashboard',
          name: 'Appointment booking (dynamic slots)',
          status: 'passed',
          duration: '1m 24s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 9,
          module: 'Expert-Dashboard',
          name: 'Create appointment and cancel',
          status: 'passed',
          duration: '1m 42s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 10,
          module: 'Expert-Dashboard',
          name: 'Create appointment and reschedule',
          status: 'passed',
          duration: '1m 54s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 11,
          module: 'Expert-Dashboard',
          name: 'Session management lifecycle',
          status: 'passed',
          duration: '1m 36s',
          screenshot: '',
          video: '',
          trace: ''
        },
        {
          id: 12,
          module: 'Expert-Dashboard',
          name: 'Create patient & book appointment',
          status: 'passed',
          duration: '1m 42s',
          screenshot: '',
          video: '',
          trace: ''
        }
      ]
    };

    // Load data from JSON file if available
    async function loadTestData() {
      try {
        const response = await fetch('./test-results.json');
        if (response.ok) {
          return await response.json();
        }
      } catch (e) {
        console.log('Using default test data');
      }
      return testData;
    }

    // Render dashboard
    async function renderDashboard() {
      const data = await loadTestData();
      
      // Update last updated
      document.getElementById('lastUpdated').textContent = 
        new Date(data.lastUpdated).toLocaleString();

      // Calculate stats
      const passed = data.tests.filter(t => t.status === 'passed').length;
      const failed = data.tests.filter(t => t.status === 'failed').length;
      const total = data.tests.length;
      const rate = Math.round((passed / total) * 100);

      document.getElementById('totalTests').textContent = total;
      document.getElementById('passedTests').textContent = passed;
      document.getElementById('failedTests').textContent = failed;
      document.getElementById('passRate').textContent = rate + '%';
      document.getElementById('progressFill').style.width = rate + '%';

      // Render run history
      const runHistory = document.getElementById('runHistory');
      runHistory.innerHTML = data.runs.map(run => {
        const status = run.failed === 0 ? 'passed' : run.failed >= 3 ? 'failed' : 'partial';
        return `
          <div class="run-bar ${status}">
            <div class="tooltip">
              ${run.date}<br>
              Passed: ${run.passed} | Failed: ${run.failed}
            </div>
          </div>
        `;
      }).join('');

      // Render test results
      renderTests(data.tests);

      // Setup filters
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.dataset.filter;
          
          let filtered = data.tests;
          if (filter === 'passed') {
            filtered = data.tests.filter(t => t.status === 'passed');
          } else if (filter === 'failed') {
            filtered = data.tests.filter(t => t.status === 'failed');
          } else if (filter === 'ccop') {
            filtered = data.tests.filter(t => t.module === 'CCOP');
          } else if (filter === 'expert') {
            filtered = data.tests.filter(t => t.module === 'Expert-Dashboard');
          }
          renderTests(filtered);
        });
      });
    }

    function renderTests(tests) {
      const tbody = document.getElementById('testResults');
      
      if (tests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No tests found</td></tr>';
        return;
      }

      tbody.innerHTML = tests.map(test => {
        const moduleClass = test.module === 'CCOP' ? 'ccop' : 'expert';
        const attachments = [];
        
        if (test.screenshot) {
          attachments.push(`<a href="${test.screenshot}" target="_blank" class="attachment-link">📷 Screenshot</a>`);
        }
        if (test.video) {
          attachments.push(`<a href="${test.video}" target="_blank" class="attachment-link">🎥 Video</a>`);
        }
        if (test.trace) {
          attachments.push(`<a href="${test.trace}" target="_blank" class="attachment-link">📊 Trace</a>`);
        }

        return `
          <tr>
            <td>${test.id}</td>
            <td><span class="module-badge ${moduleClass}">${test.module}</span></td>
            <td>${test.name}</td>
            <td>
              <span class="status-badge ${test.status}">
                <span class="status-icon ${test.status}"></span>
                ${test.status.toUpperCase()}
              </span>
            </td>
            <td class="duration">${test.duration}</td>
            <td>${attachments.length > 0 ? attachments.join(' ') : '-'}</td>
          </tr>
        `;
      }).join('');
    }

    // Initialize
    renderDashboard();
  </script>
</body>
</html>
