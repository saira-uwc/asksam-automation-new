name: Run Playwright Tests

on:
  # Triggered by Google Apps Script scheduler via repository_dispatch
  repository_dispatch:
    types: [run-tests, send-email]

  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g., CCOP, Expert-Dashboard, or leave empty for all)'
        required: false
        default: ''
      send_email:
        description: 'Send email report after tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  test:
    # Skip test job if this is a send-email-only dispatch
    if: github.event.action != 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_filter }}"
          else
            npx playwright test
          fi
        env:
          CI: true
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}
          # AU proxy for Stripe geo-restricted signup test (optional)
          AU_PROXY_SERVER: ${{ secrets.AU_PROXY_SERVER }}
          AU_PROXY_USERNAME: ${{ secrets.AU_PROXY_USERNAME }}
          AU_PROXY_PASSWORD: ${{ secrets.AU_PROXY_PASSWORD }}

      - name: Generate dashboard data
        if: always()
        run: node scripts/generate-dashboard.js

      - name: Commit and push dashboard updates
        if: always()
        continue-on-error: true
        run: |
          set -x
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git status --short docs/ || true
          git add docs/ || true
          git diff --staged --name-only
          if git diff --staged --quiet; then
            echo "::warning::No dashboard changes to commit"
          else
            git commit -m "Update dashboard data [skip ci]"
            # Stash any remaining dirty files (test artifacts, etc) so rebase can run
            git stash --include-untracked || true
            for i in 1 2 3; do
              echo "Push attempt $i"
              if git push origin HEAD:main 2>&1; then
                echo "::notice::Pushed dashboard to main"
                break
              fi
              sleep 2
              git fetch origin main
              git rebase origin/main || git rebase --abort
            done
          fi

      - name: Send email report
        if: always() && (github.event.action == 'run-tests' || github.event.inputs.send_email == 'true')
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            reports/
            test-results/
          retention-days: 30

  # Standalone email job — triggered by "send-email" dispatch
  send-email:
    if: github.event.action == 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send email report
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
