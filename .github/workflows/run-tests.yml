name: Run Playwright Tests

on:
  # Triggered by Google Apps Script scheduler via repository_dispatch
  repository_dispatch:
    types: [run-tests, send-email]

  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g., CCOP, Expert-Dashboard, or leave empty for all)'
        required: false
        default: ''
      send_email:
        description: 'Send email report after tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  test:
    # Skip test job if this is a send-email-only dispatch
    if: github.event.action != 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_filter }}"
          else
            npx playwright test
          fi
        env:
          CI: true
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}

      - name: Generate dashboard data
        if: always()
        run: node scripts/generate-dashboard.js

      - name: Commit and push dashboard updates
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ || true
          git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
          # Rebase on latest main to handle concurrent pushes
          git pull --rebase origin main || git rebase --abort
          # Retry push up to 3 times in case of race conditions
          for i in 1 2 3; do
            if git push origin HEAD:main; then break; fi
            sleep 2
            git pull --rebase origin main || git rebase --abort
          done

      - name: Push dashboard to GitHub Pages repo
        if: always()
        continue-on-error: true
        run: |
          git clone https://x-access-token:${{ secrets.DASHBOARD_PAT }}@github.com/saira-uwc/asksam-playwright-reports.git /tmp/dashboard-repo

          # Sync all dashboard files (HTML, JSON data, history, artifacts, exports)
          cp docs/index.html /tmp/dashboard-repo/index.html
          cp docs/.nojekyll /tmp/dashboard-repo/.nojekyll 2>/dev/null || true
          cp docs/test-results.json /tmp/dashboard-repo/test-results.json

          # Sync data, exports, and artifacts directories
          mkdir -p /tmp/dashboard-repo/data /tmp/dashboard-repo/history /tmp/dashboard-repo/exports /tmp/dashboard-repo/artifacts
          cp -r docs/data/* /tmp/dashboard-repo/data/ 2>/dev/null || true
          cp -r docs/exports/* /tmp/dashboard-repo/exports/ 2>/dev/null || true
          cp -r docs/artifacts/* /tmp/dashboard-repo/artifacts/ 2>/dev/null || true

          # Merge history: combine Pages repo history with new run (deduplicate by id, keep last 15 days)
          node -e "
            const fs = require('fs');
            const DAYS = 15;
            const cutoff = Date.now() - DAYS * 24 * 60 * 60 * 1000;
            const newRuns = JSON.parse(fs.readFileSync('docs/history/runs.json', 'utf8') || '[]');
            const existing = fs.existsSync('/tmp/dashboard-repo/history/runs.json')
              ? JSON.parse(fs.readFileSync('/tmp/dashboard-repo/history/runs.json', 'utf8') || '[]')
              : [];
            const merged = new Map();
            for (const r of [...existing, ...newRuns]) {
              if (r.id && new Date(r.startedAt).getTime() >= cutoff) merged.set(r.id, r);
            }
            const result = Array.from(merged.values())
              .sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));
            fs.writeFileSync('/tmp/dashboard-repo/history/runs.json', JSON.stringify(result, null, 2));
            console.log('History merged: ' + result.length + ' runs (last ' + DAYS + ' days)');
          "

          cd /tmp/dashboard-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Update dashboard — $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Send email report
        if: always() && (github.event.action == 'run-tests' || github.event.inputs.send_email == 'true')
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            reports/
            test-results/
          retention-days: 30

  # Standalone email job — triggered by "send-email" dispatch
  send-email:
    if: github.event.action == 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send email report
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
