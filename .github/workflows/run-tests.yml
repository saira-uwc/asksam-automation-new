name: Run Playwright Tests

on:
  # Triggered by Google Apps Script scheduler via repository_dispatch
  repository_dispatch:
    types: [run-tests, send-email]

  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g., CCOP, Expert-Dashboard, or leave empty for all)'
        required: false
        default: ''
      send_email:
        description: 'Send email report after tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  test:
    # Skip test job if this is a send-email-only dispatch
    if: github.event.action != 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_filter }}"
          else
            npx playwright test
          fi
        env:
          CI: true
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}

      - name: Generate dashboard data
        if: always()
        run: node scripts/generate-dashboard.js

      - name: Commit and push dashboard updates
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
          git push

      - name: Push dashboard to GitHub Pages repo
        if: always()
        run: |
          git clone https://x-access-token:${{ secrets.DASHBOARD_PAT }}@github.com/saira-uwc/asksam-playwright-reports.git /tmp/dashboard-repo
          cp docs/test-results.json /tmp/dashboard-repo/test-results.json
          cd /tmp/dashboard-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add test-results.json
          git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
          git push

      - name: Send email report
        if: always() && (github.event.action == 'run-tests' || github.event.inputs.send_email == 'true')
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            reports/
            test-results/
          retention-days: 30

  # Standalone email job — triggered by "send-email" dispatch
  send-email:
    if: github.event.action == 'send-email'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send email report
        run: node scripts/send-email-report.js
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
